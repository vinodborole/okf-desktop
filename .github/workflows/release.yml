name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # manual runs build + upload artifacts (no release needed)

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  artifact: okf-desktop-linux-x64.tar.gz }
          - { os: macos-latest,   artifact: okf-desktop-macos.zip }
          - { os: windows-latest, artifact: okf-desktop-windows-x64.zip }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux system deps (GTK + WebKit2)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config python3-dev \
            libgirepository1.0-dev libcairo2-dev \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 libwebkit2gtk-4.1-0

      - name: Python deps (Linux — GTK backend)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install "okf-kit[serve,chat]" pyinstaller "pywebview[gtk]"

      - name: Python deps (macOS / Windows)
        if: runner.os != 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install "okf-kit[serve,chat]" pyinstaller pywebview

      - name: Freeze with PyInstaller
        run: python -m PyInstaller okf-desktop.spec --noconfirm --log-level WARN

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -C dist -czf "${{ matrix.artifact }}" okf-desktop
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          # Deep ad-hoc sign the whole .app (incl. Python.framework), then use
          # ditto (not zip) so the signature + framework symlinks survive.
          codesign --force --deep --sign - dist/okf-desktop.app
          codesign --verify --deep --strict dist/okf-desktop.app && echo "signature OK"
          ditto -c -k --keepParent dist/okf-desktop.app "${{ matrix.artifact }}"
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/okf-desktop -DestinationPath "${{ matrix.artifact }}"

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
